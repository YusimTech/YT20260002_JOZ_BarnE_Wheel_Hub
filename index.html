<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Animation Showcase</title>
    <style>
        body { font-family: sans-serif; background: #f4f4f9; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        .gallery { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; width: 100%; max-width: 1200px; }
        .card { background: white; padding: 10px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); text-align: center; }
        img { width: 100%; height: auto; border-radius: 4px; }
        h2 { color: #333; }
    </style>
</head>
<body>
    <h2>Project Animations</h2>
    <div class="gallery">
        <div class="card">
            <img src="animation1.gif" alt="First Animation">
            <p>Feature Analysis 01</p>
        </div>
        
        <div class="card">
            <img src="animation2.gif" alt="Second Animation">
            <p>System Flow 02</p>
        </div>
    </div>
</body>
</html>
